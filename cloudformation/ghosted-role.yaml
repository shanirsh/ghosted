AWSTemplateFormatVersion: '2010-09-09'
Description: IAM role that lets Ghosted Cloud AI manage selected AWS resources through STS AssumeRole.

Parameters:
  ExternalId:
    Type: String
    Description: External ID shown in the Ghosted setup flow.
    MinLength: 1

  GhostedAccountId:
    Type: String
    Description: AWS account ID allowed to assume this role.
    AllowedPattern: '^\d{12}$'

Resources:
  GhostedIntegrationRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'ghosted-integration-${AWS::AccountId}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${GhostedAccountId}:root'
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId
      Policies:
        - PolicyName: GhostedResourceManagement
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: EC2Management
                Effect: Allow
                Action:
                  - ec2:RunInstances
                  - ec2:StartInstances
                  - ec2:StopInstances
                  - ec2:RebootInstances
                  - ec2:TerminateInstances
                  - ec2:Describe*
                  - ec2:CreateTags
                  - ec2:DeleteTags
                  - ec2:CreateVpc
                  - ec2:ModifyVpcAttribute
                  - ec2:CreateSubnet
                  - ec2:CreateSecurityGroup
                  - ec2:AuthorizeSecurityGroupIngress
                  - ec2:CreateInternetGateway
                  - ec2:AttachInternetGateway
                  - ec2:CreateRoute
                  - ec2:ModifyInstanceAttribute
                Resource: '*'
              - Sid: S3Management
                Effect: Allow
                Action:
                  - s3:CreateBucket
                  - s3:DeleteBucket
                  - s3:ListAllMyBuckets
                  - s3:ListBucket
                  - s3:GetBucketLocation
                  - s3:GetBucketVersioning
                  - s3:PutBucketVersioning
                  - s3:PutBucketPolicy
                  - s3:GetBucketPolicy
                  - s3:DeleteBucketPolicy
                  - s3:PutObject
                  - s3:GetObject
                  - s3:DeleteObject
                  - s3:DeleteObjectVersion
                  - s3:ListBucketVersions
                Resource:
                  - arn:aws:s3:::*
                  - arn:aws:s3:::*/*
              - Sid: ReadAccountIdentity
                Effect: Allow
                Action:
                  - sts:GetCallerIdentity
                Resource: '*'
      Tags:
        - Key: ManagedBy
          Value: Ghosted

Outputs:
  RoleArn:
    Description: ARN of the created IAM role.
    Value: !GetAtt GhostedIntegrationRole.Arn
  ExternalId:
    Description: External ID to paste into Ghosted.
    Value: !Ref ExternalId
